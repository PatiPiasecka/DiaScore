name: Package build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Linter)
        run: uv run ruff check .

      - name: Run Ruff (Formatter)
        run: uv run ruff format --check .

      - name: Generate ML artifacts (Data & Model)
        run: |
          uv run python ml/src/split_data.py
          uv run python ml/src/train.py

      - name: Run Tests
        run: uv run pytest -v
