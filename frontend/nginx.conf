# Nginx configuration for serving the React SPA
# and proxying API requests to the backend container

server {
    listen 80;
    server_name localhost;

    # Serve static files (the built React app)
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # This is important for Single Page Applications (SPA):
        # If a file doesn't exist, serve index.html instead.
        # This lets React Router handle the URLs (e.g. /history).
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    # Any request starting with /api/ gets forwarded to FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
